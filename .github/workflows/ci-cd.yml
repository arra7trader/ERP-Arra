name: CI/CD ERP Superior
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: erpuser
          POSTGRES_PASSWORD: erppass
          POSTGRES_DB: erpdb
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build API
        run: npm run build --workspace=apps/api
      - name: Build Web
        run: npm run build --workspace=apps/web
      - name: Run tests
        run: npm test
      - name: Docker Compose Build
        run: docker-compose build
      - name: Docker Compose Up
        run: docker-compose up -dname: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: erp
          POSTGRES_PASSWORD: erp123
          POSTGRES_DB: erp_superior
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies (root)
        run: npm install
      - name: Install dependencies (web)
        run: cd apps/web && npm install
      - name: Install dependencies (api)
        run: cd apps/api && npm install
      - name: Build web
        run: cd apps/web && npm run build
      - name: Build api
        run: cd apps/api && npm run build
      - name: Run tests (api)
        run: cd apps/api && npm run test
