version: '3.8'
services:
  api:
    build: ./apps/api
    ports:
      - "4000:3000"
    env_file:
      - ./apps/api/.env
    depends_on:
      - db
  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    env_file:
      - ./apps/web/.env
    depends_on:
      - api
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: erpuser
      POSTGRES_PASSWORD: erppass
      POSTGRES_DB: erpdb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  db_data:
